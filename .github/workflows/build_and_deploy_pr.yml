name: Deploy Snowpark Apps

# Controls when the action will run. 
# Controls when the action will run. 
on:
  push:
    branches:
      - prod

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: pradeepetl/snowparkdev
          #path: dev
          ref: prod
          
      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Deploy Snowpark apps
        working-directory: first_snowpark_project
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT_PR }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER_PR }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD_PR }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE_PR }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE_PR }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE_PR }}
        run: python deploy_snowpark_app.py $GITHUB_WORKSPACE/first_snowpark_project
      
      - name: Deploy Snowpark tasks
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT_PR }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER_PR }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD_PR }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE_PR }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE_PR }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE_PR }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA_PR }}
        working-directory: first_snowpark_project/app
        run: python create_task.py